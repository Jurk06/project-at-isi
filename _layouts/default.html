<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="author" content="{{ site.author }}" />
  <meta property="og:title" content="{{ page.title }} | {{ site.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:type" content="website" />
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav id="main-nav">
    <a href="{{ site.baseurl }}/" class="nav-brand">💧 Well Risk Analysis</a>
    <ul class="nav-links">
      <li><a href="{{ site.baseurl }}/anova/">ANOVA</a></li>
      <li><a href="{{ site.baseurl }}/visualization/">Visualization</a></li>
      <li><a href="{{ site.baseurl }}/imputation/">Imputation</a></li>
      <li><a href="{{ site.baseurl }}/trends/">Trends</a></li>
      <li><a href="{{ site.baseurl }}/clustering/">Clustering</a></li>
      <li><a href="{{ site.baseurl }}/about/">About</a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle black theme" title="Toggle black theme">
        <span id="theme-icon">⬛</span>
      </button>
      <a href="https://github.com/rabikumarsingh/project-at-isi" target="_blank" rel="noopener" class="nav-github">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.929.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
      </a>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  {{ content }}

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <span>© 2024 <strong>Rab Kumari Singh</strong> · ISI Kolkata</span>
      <span>
        <a href="https://rabkumarisinghisikolkata.medium.com/visualization-and-multiple-imputation-734b9e73f2b2" target="_blank" rel="noopener">Medium Blog</a>
        &nbsp;·&nbsp;
        <a href="https://www.kaggle.com/rabikumarsingh/" target="_blank" rel="noopener">Kaggle</a>
        &nbsp;·&nbsp;
        <a href="https://github.com/rabikumarsingh/project-at-isi" target="_blank" rel="noopener">GitHub</a>
      </span>
    </div>
  </footer>

  <script>
    // ---- THEME TOGGLE ----
    const toggle = document.getElementById('theme-toggle');
    const icon   = document.getElementById('theme-icon');
    const html   = document.documentElement;

    const saved = localStorage.getItem('wra-theme') || 'dark';
    html.setAttribute('data-theme', saved);
    icon.textContent = saved === 'black' ? '🌙' : '⬛';

    toggle.addEventListener('click', () => {
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'black' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('wra-theme', next);
      icon.textContent = next === 'black' ? '🌙' : '⬛';
    });

    // ---- NAV SCROLL EFFECT ----
    const nav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => {
      nav.style.background = window.scrollY > 40
        ? 'rgba(5,13,26,0.97)'
        : 'rgba(5,13,26,0.85)';
    });

    // ---- INTERSECTION OBSERVER ANIMATIONS ----
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.style.opacity = '1';
          e.target.style.transform = 'translateY(0)';
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.analysis-card, .stat-card, .finding-card, .tech-pill').forEach(el => {
      el.style.opacity = '0';
      el.style.transform = 'translateY(20px)';
      el.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      observer.observe(el);
    });
  </script>
</body>
</html>
