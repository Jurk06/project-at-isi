# Jekyll Configuration for GitHub Pages
title: Water Well Riskiness Analysis
description: Analysis of water well riskiness across different states of India — ISI Kolkata
author: Rab Kumari Singh

# GitHub Pages Settings
plugins:
  - jekyll-seo-tag

# Site Settings
baseurl: /project-at-isi
url: https://jurk06.github.io
permalink: /:title/

# Build Settings
markdown: kramdown
kramdown:
  input: GFM
highlighter: rouge
excerpt_separator: <!--more-->

# Collections
collections:
  pages:
    output: true
    permalink: /:collection/:name/
